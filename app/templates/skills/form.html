{% extends 'base.html' %}
{% block title %}{% if skill %}Editar {{ skill.name_es }}{% else %}Nueva Habilidad{% endif %} — Profesiones WH{% endblock %}

{% block content %}
<div class="container mt-4" style="max-width:600px">
  <h2 class="wh-heading mb-4">{% if skill %}Editar: {{ skill.name_es }}{% else %}Nueva Habilidad{% endif %}</h2>
  <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="card wh-card">
      <div class="card-body">
        <div class="mb-3">
          <label class="form-label wh-label">Nombre (ES) *</label>
          <input type="text" name="name_es" class="form-control wh-input" required value="{{ skill.name_es if skill else '' }}">
        </div>
        <div class="mb-3">
          <label class="form-label wh-label">Nombre (EN)</label>
          <input type="text" name="name_en" class="form-control wh-input" value="{{ skill.name_en if skill and skill.name_en else '' }}">
        </div>
        <div class="mb-3">
          <label class="form-label wh-label">Descripción</label>
          <textarea name="description" rows="3" class="form-control wh-input">{{ skill.description if skill and skill.description else '' }}</textarea>
        </div>
        <div class="form-check mb-3">
          <input type="checkbox" name="is_advanced" class="form-check-input" id="is_advanced"
                 {% if skill and skill.is_advanced %}checked{% endif %}>
          <label class="form-check-label wh-label" for="is_advanced">Habilidad Avanzada</label>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-wh"><i class="bi bi-floppy me-1"></i>Guardar</button>
          <a href="{{ url_for('skills_talents.list_skills') }}" class="btn btn-outline-secondary">Cancelar</a>
        </div>
      </div>
    </div>
  </form>
</div>
{% endblock %}
