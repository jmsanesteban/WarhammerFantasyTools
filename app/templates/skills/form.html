{% extends 'base.html' %}
{% block title %}{% if skill %}Editar {{ skill.name_es }}{% else %}Nueva Habilidad{% endif %} — Warhammer Fantasy Tools{% endblock %}

{% block content %}
<div class="container mt-4" style="max-width:700px">
  <h2 class="wh-heading mb-4">{% if skill %}Editar: {{ skill.name_es }}{% else %}Nueva Habilidad{% endif %}</h2>
  <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="card wh-card">
      <div class="card-body">

        <div class="row g-3 mb-3">
          <div class="col-md-6">
            <label class="form-label wh-label">Nombre (ES) *</label>
            <input type="text" name="name_es" class="form-control wh-input" required
                   value="{{ skill.name_es if skill else '' }}">
          </div>
          <div class="col-md-6">
            <label class="form-label wh-label">Nombre (EN)</label>
            <input type="text" name="name_en" class="form-control wh-input"
                   value="{{ skill.name_en if skill and skill.name_en else '' }}">
          </div>
        </div>

        <div class="row g-3 mb-3">
          <div class="col-md-8">
            <label class="form-label wh-label">Características asociadas</label>
            <input type="text" name="caracteristicas" class="form-control wh-input"
                   placeholder="Ej: Empatía, Inteligencia"
                   value="{{ skill.caracteristicas if skill and skill.caracteristicas else '' }}">
          </div>
          <div class="col-md-4">
            <div class="form-check mt-4">
              <input type="checkbox" name="is_advanced" class="form-check-input" id="is_advanced"
                     {% if skill and skill.is_advanced %}checked{% endif %}>
              <label class="form-check-label wh-label" for="is_advanced">Habilidad Avanzada</label>
            </div>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label wh-label">Descripción</label>
          <textarea name="description" rows="4" class="form-control wh-input">{{ skill.description if skill and skill.description else '' }}</textarea>
        </div>

        <div class="mb-3">
          <label class="form-label wh-label">Talentos asociados</label>
          <input type="text" name="talentos_asociados" class="form-control wh-input"
                 placeholder="Ej: Contorsionista, Imitador — o Ninguno"
                 value="{{ skill.talentos_asociados if skill and skill.talentos_asociados else '' }}">
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-wh"><i class="bi bi-floppy me-1"></i>Guardar</button>
          <a href="{{ url_for('skills_talents.list_skills') }}" class="btn btn-outline-secondary">Cancelar</a>
        </div>
      </div>
    </div>
  </form>
</div>
{% endblock %}
