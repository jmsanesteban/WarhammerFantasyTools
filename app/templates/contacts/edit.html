{% extends 'base.html' %}
{% block title %}Editar {{ contact.nombre }} — Warhammer Fantasy Tools{% endblock %}

{% block content %}
<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="wh-heading mb-0"><i class="bi bi-pencil me-2"></i>Editar contacto</h2>
    <a href="{{ url_for('contacts.detail', contact_id=contact.id) }}" class="btn btn-outline-secondary btn-sm">
      <i class="bi bi-arrow-left me-1"></i>Volver a la ficha
    </a>
  </div>

  <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="card wh-card mb-4" style="max-width:700px">
      <div class="card-header wh-card-header">Datos del contacto</div>
      <div class="card-body">
        <div class="row g-3">
          <div class="col-md-8">
            <label class="form-label wh-label">Nombre *</label>
            <input type="text" name="nombre" class="form-control wh-input" required value="{{ contact.nombre }}">
          </div>
          <div class="col-md-4 d-flex align-items-end">
            <label class="d-flex align-items-center gap-2" style="cursor:pointer">
              <input type="checkbox" name="es_untersuchung" class="form-check-input"
                     {% if contact.es_untersuchung %}checked{% endif %}>
              Untersuchung
            </label>
          </div>
          <div class="col-12">
            <label class="form-label wh-label">Profesiones</label>
            <select name="profession_ids" class="form-select wh-input" multiple size="6">
              {% for p in professions %}
              <option value="{{ p.id }}" {% if p.id in selected_profession_ids %}selected{% endif %}>{{ p.name }}</option>
              {% endfor %}
            </select>
            <small class="text-muted">Ctrl/Cmd + clic para elegir varias.</small>
          </div>
          <div class="col-12">
            <label class="d-flex align-items-center gap-2" style="cursor:pointer">
              <input type="checkbox" name="is_visible" class="form-check-input" {% if contact.is_visible %}checked{% endif %}>
              Visible (si se desmarca, queda oculto para todos los personajes, sin importar su visibilidad concedida)
            </label>
          </div>
        </div>
      </div>
    </div>

    <div class="d-flex gap-2 mb-5">
      <button type="submit" class="btn btn-wh"><i class="bi bi-floppy me-1"></i>Guardar cambios</button>
      <a href="{{ url_for('contacts.detail', contact_id=contact.id) }}" class="btn btn-outline-secondary">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
