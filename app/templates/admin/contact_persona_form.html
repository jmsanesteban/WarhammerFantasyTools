{% extends 'base.html' %}
{% block title %}{{ title }} — Warhammer Fantasy Tools{% endblock %}

{% block content %}
<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="wh-heading mb-0">{{ title }}</h2>
    <a href="{{ url_for('admin.contact_personas') }}" class="btn btn-outline-secondary btn-sm">
      <i class="bi bi-arrow-left me-1"></i>Volver
    </a>
  </div>

  <div class="card wh-card" style="max-width:480px">
    <div class="card-body">
      <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="mb-3">
          <label class="wh-label d-block">Nombre</label>
          <input type="text" name="name" class="form-control wh-input"
                 value="{{ persona.name if persona else '' }}" placeholder="Nombre del vínculo" required maxlength="128">
        </div>

        <div class="mb-3">
          <label class="wh-label d-block">Usuario (opcional)</label>
          <select name="user_id" class="form-select wh-input">
            {% for uid, uname in user_choices %}
            <option value="{{ uid }}" {% if persona and persona.user_id == uid %}selected{% endif %}>{{ uname }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="mb-3">
          <label class="d-flex align-items-center gap-2" style="cursor:pointer">
            <input type="checkbox" name="is_active" class="form-check-input"
                   {% if not persona or persona.is_active %}checked{% endif %}>
            Vínculo activo
          </label>
        </div>

        <div class="d-flex gap-2 mt-4">
          <button type="submit" class="btn btn-wh">Guardar</button>
          <a href="{{ url_for('admin.contact_personas') }}" class="btn btn-outline-secondary">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
