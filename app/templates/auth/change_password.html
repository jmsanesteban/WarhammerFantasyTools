{% extends 'base.html' %}
{% block title %}Cambiar contraseña — Warhammer Fantasy Tools{% endblock %}

{% block content %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card wh-card">
        <div class="card-body p-4">
          <h3 class="wh-heading text-center mb-4"><i class="bi bi-key me-2"></i>Cambiar contraseña</h3>

          {% if forced %}
          <div class="alert alert-warning wh-alert">
            Un administrador ha solicitado que cambies tu contraseña antes de continuar.
          </div>
          {% endif %}

          <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
              <label class="form-label wh-label">Contraseña actual</label>
              <input type="password" name="current_password" class="form-control wh-input" required autofocus>
            </div>
            <div class="mb-3">
              <label class="form-label wh-label">Nueva contraseña</label>
              <input type="password" name="new_password" class="form-control wh-input" required minlength="8">
              <small class="text-muted">Mínimo 8 caracteres.</small>
            </div>
            <div class="mb-3">
              <label class="form-label wh-label">Confirmar nueva contraseña</label>
              <input type="password" name="confirm_password" class="form-control wh-input" required minlength="8">
            </div>
            <button type="submit" class="btn btn-wh w-100">Guardar</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
