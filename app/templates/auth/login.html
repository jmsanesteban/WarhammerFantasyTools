{% extends 'base.html' %}
{% block title %}Iniciar sesión — Profesiones WH{% endblock %}

{% block content %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card wh-card">
        <div class="card-body p-4">
          <h3 class="wh-heading text-center mb-4"><i class="bi bi-box-arrow-in-right me-2"></i>Iniciar sesión</h3>
          <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
              <label class="form-label wh-label">Usuario</label>
              <input type="text" name="username" class="form-control wh-input" required autofocus>
            </div>
            <div class="mb-3">
              <label class="form-label wh-label">Contraseña</label>
              <input type="password" name="password" class="form-control wh-input" required>
            </div>
            <div class="mb-3 form-check">
              <input type="checkbox" name="remember" class="form-check-input" id="remember">
              <label class="form-check-label wh-label" for="remember">Recordarme</label>
            </div>
            <button type="submit" class="btn btn-wh w-100">Entrar</button>
          </form>
          <hr class="wh-divider-sm">
          <p class="text-center mb-0">
            <small>¿No tienes cuenta? <a href="{{ url_for('auth.register') }}" class="wh-link">Regístrate</a></small>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
