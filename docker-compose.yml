version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: profesiones_wh_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-profesiones_wh}
      MYSQL_USER: ${MYSQL_USER:-whuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-whpassword}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - wh_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    build: .
    container_name: profesiones_wh_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - FLASK_APP=run.py
      - DATABASE_URL=mysql+pymysql://${MYSQL_USER:-whuser}:${MYSQL_PASSWORD:-whpassword}@db:3306/${MYSQL_DATABASE:-profesiones_wh}
    volumes:
      - ./uploads:/app/uploads
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - wh_network

networks:
  wh_network:
    driver: bridge

volumes:
  mysql_data:
