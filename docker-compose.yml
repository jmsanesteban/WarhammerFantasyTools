services:
  db:
    image: mysql:8.0
    container_name: wft_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-wft}
      MYSQL_USER: ${MYSQL_USER:-wftuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-wftpassword}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - wft_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    build: .
    container_name: wft_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - FLASK_APP=run.py
      - DATABASE_URL=mysql+pymysql://${MYSQL_USER:-wftuser}:${MYSQL_PASSWORD:-wftpassword}@db:3306/${MYSQL_DATABASE:-wft}
    volumes:
      - ./uploads:/app/uploads
      - pdf_cache:/app/pdf_cache
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - wft_network

networks:
  wft_network:
    driver: bridge

volumes:
  mysql_data:
  pdf_cache:
